<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Anamnese • Vitor Freitas</title>

  <style>
    /* =====================================================
      VARIÁVEIS CSS (Design Tokens)
      Centraliza as cores e valores reutilizados no projeto.
      Alterar aqui reflete em todo o visual da página.
    ===================================================== */
    :root{
      --navy:#0B1F3B;                        /* Azul escuro principal */
      --navy2:#07182B;                       /* Azul ainda mais escuro */
      --ink:#0a0f18;                         /* Quase preto */
      --orange:#FF8C00;                      /* Laranja principal */
      --orange2:#ff7a00;                     /* Laranja mais intenso */
      --white:#ffffff;
      --muted:rgba(255,255,255,.75);         /* Branco semi-transparente */
      --card:rgba(255,255,255,.06);          /* Fundo dos cards */
      --stroke:rgba(255,255,255,.12);        /* Bordas sutis */
      --shadow:0 14px 35px rgba(0,0,0,.35); /* Sombra padrão */
      --radius:22px;                         /* Borda arredondada padrão */
    }

    /* Reset e configuração base */
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{
      font-family: Arial, sans-serif;
      /* Gradiente de fundo: brilho laranja suave no topo + azul escuro para baixo */
      background: radial-gradient(900px 500px at 50% -30%, rgba(255,140,0,.25), transparent 65%),
                  linear-gradient(180deg, #07152a, #050b14);
      color:var(--white);
      overflow-x:hidden;  /* Evita scroll horizontal */
    }

    /* Wrapper central com padding inferior para não ficar atrás do botão */
    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 80px}

    /* =====================================================
      BARRA SUPERIOR FIXA (sticky)
      Permanece visível ao rolar. Contém logo, barra de
      progresso e chip com número da etapa atual.
    ===================================================== */
    .top{
      position:sticky;top:10px;z-index:10;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 14px;
      background:linear-gradient(180deg, rgba(11,31,59,.96), rgba(7,24,43,.92));
      border:1px solid var(--stroke);
      border-radius:24px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);  /* Efeito de vidro fosco */
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0}

    /* Círculo com iniciais "VF" */
    .logo{
      width:38px;height:38px;border-radius:999px;
      display:grid;place-items:center;
      border:2px solid rgba(255,140,0,.85);
      background:rgba(0,0,0,.15);
      font-weight:900;letter-spacing:.5px;
    }
    .brandTxt{min-width:0}

    /* Nome do personal "VITOR FREITAS" */
    .brandTxt .t1{
      font-size:14px;font-weight:900;letter-spacing:.18em;
      text-transform:uppercase;color:var(--orange);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }

    /* Subtítulo "Anamnese do aluno" */
    .brandTxt .t2{
      margin-top:4px;font-size:12px;color:var(--muted);
      letter-spacing:.12em;text-transform:uppercase;
    }

    /* Chip com "ETAPA X DE 6" no canto direito */
    .stepChip{
      font-size:12px;font-weight:900;
      letter-spacing:.14em;text-transform:uppercase;
      color:rgba(255,255,255,.9);
      background:rgba(255,140,0,.14);
      border:1px solid rgba(255,140,0,.28);
      padding:8px 10px;border-radius:999px;
      white-space:nowrap;
    }

    /* Barra de progresso — largura atualizada via JS conforme avança etapas */
    .bar{
      height:4px;border-radius:999px;background:rgba(255,255,255,.12);
      overflow:hidden;margin-top:10px
    }
    .bar > div{height:100%;width:0;background:linear-gradient(90deg, var(--orange), #ffd08a)}

    /* =====================================================
      CARD PRINCIPAL
      Contém o cabeçalho da etapa e o formulário
    ===================================================== */
    .card{
      margin-top:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    /* Cabeçalho do card: título, descrição e navegação por etapas */
    .head{
      padding:22px 18px 16px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .head h1{font-size:42px;line-height:1.02;letter-spacing:.02em;}
    .head h1 span{color:var(--orange)}   /* Destaque laranja na segunda palavra do título */
    .head p{
      margin-top:10px;color:var(--muted);line-height:1.45;font-size:14px;
      max-width:60ch;
    }

    /* =====================================================
      NAVEGAÇÃO POR ETAPAS (pills)
      Botões clicáveis para navegar entre as 6 etapas
    ===================================================== */
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .pill{
      font-size:12px;letter-spacing:.12em;text-transform:uppercase;
      padding:8px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.88);
      cursor:pointer;user-select:none;
    }
    /* Etapa ativa destacada em laranja */
    .pill.active{
      border-color:rgba(255,140,0,.45);
      background:rgba(255,140,0,.16);
      color:#fff;font-weight:900;
    }

    /* Área de conteúdo do formulário */
    .body{padding:18px}

    /* Labels dos campos */
    label{
      display:block;
      font-size:12px;font-weight:900;
      letter-spacing:.14em;text-transform:uppercase;
      color:rgba(255,255,255,.82);
      margin-top:14px;
    }

    /* Campos de formulário: input, select e textarea */
    input,select,textarea{
      width:100%;
      margin-top:8px;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.18);
      color:#fff;
      outline:none;
    }

    /* Campo desabilitado (código pré-preenchido via URL) */
    input:disabled{
      opacity:.6;
      cursor:not-allowed;
      background:rgba(255,140,0,.08);    /* Fundo levemente laranja */
      border-color:rgba(255,140,0,.25);  /* Borda laranja suave */
    }

    textarea{min-height:92px;resize:vertical}

    /* Texto de ajuda abaixo dos campos */
    .hint{margin-top:8px;color:rgba(255,255,255,.70);font-size:12px;line-height:1.4}

    /* Grid responsivo para campos lado a lado */
    .grid{display:grid;gap:14px}
    @media(min-width:820px){
      .grid.cols2{grid-template-columns:1fr 1fr}  /* 2 colunas em telas maiores */
    }

    /* Linha de botões (Voltar / Próxima etapa) */
    .btnRow{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
    .btn{
      border:0;cursor:pointer;
      padding:16px 18px;border-radius:18px;
      font-weight:900;letter-spacing:.06em;text-transform:uppercase;
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
    }
    /* Botão primário laranja (ação principal) */
    .btn.primary{
      background:linear-gradient(180deg, #ff9a1a, #ff7a00);
      color:#0b0f14;
      border:1px solid rgba(255,140,0,.45);
      box-shadow:0 10px 22px rgba(255,140,0,.20);
    }
    .btn:disabled{opacity:.55;cursor:not-allowed}

    /* =====================================================
      ETAPA 3: PIRÂMIDE DE PREFERÊNCIA
      Lista reordenável de grupos musculares
    ===================================================== */
    .rankList{display:grid;gap:10px;margin-top:8px}
    .rankItem{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:12px 12px;border-radius:18px;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.10);
    }
    .rankLeft{display:flex;align-items:center;gap:10px;min-width:0}
    /* Número de posição (1º, 2º...) */
    .rankNum{
      width:40px;height:40px;border-radius:16px;
      display:grid;place-items:center;
      background:rgba(255,140,0,.18);
      border:1px solid rgba(255,140,0,.35);
      font-weight:900;
    }
    .rankName{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .rankBtns{display:flex;gap:8px}
    /* Botões ↑ e ↓ para mover os grupos musculares */
    .miniBtn{
      padding:10px 12px;border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;font-weight:900;cursor:pointer;
    }
    .miniBtn:disabled{opacity:.35;cursor:not-allowed}

    /* =====================================================
      ETAPA 5: FOTOS DE AVALIAÇÃO
      Grid de fotos modelo + uploads do aluno
    ===================================================== */
    .models{
      display:grid;gap:10px;margin-top:10px;
      grid-template-columns:repeat(2,1fr);   /* 2 colunas no mobile */
    }
    @media(min-width:820px){ .models{grid-template-columns:repeat(5,1fr)} }  /* 5 colunas no desktop */

    /* Card de cada foto modelo */
    .modelCard{
      border-radius:18px;overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.18);
      box-shadow:0 10px 24px rgba(0,0,0,.25);
    }
    .modelCard img{width:100%;height:140px;object-fit:cover;display:block;}
    .modelCap{
      padding:10px 10px;font-size:12px;font-weight:900;
      letter-spacing:.12em;text-transform:uppercase;
      color:rgba(255,255,255,.9);
      display:flex;justify-content:space-between;align-items:center;
    }

    /* Badge/tag laranja (ex: "Exemplo", "Foto 01") */
    .tag{
      font-size:11px;font-weight:900;
      padding:6px 10px;border-radius:999px;
      background:rgba(255,140,0,.18);
      border:1px solid rgba(255,140,0,.28);
      color:#fff;letter-spacing:.08em;
    }

    /* Grid de uploads do aluno (2 colunas no desktop) */
    .uploads{display:grid;gap:10px;margin-top:12px}
    @media(min-width:820px){ .uploads{grid-template-columns:1fr 1fr} }

    /* Card de cada upload */
    .upCard{
      border-radius:18px;padding:12px;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.10);
    }
    .upHead{display:flex;align-items:center;justify-content:space-between;gap:10px}

    /* Status do upload: neutro, ok (verde) ou erro (vermelho) */
    .status{font-size:12px;color:rgba(255,255,255,.70);font-weight:900}
    .status.ok{color:#22c55e}
    .status.err{color:#ef4444}

    /* Badge de acesso exclusivo — exibido quando código vem pela URL */
    .vipBadge{
      display:inline-flex;align-items:center;gap:8px;
      margin-top:10px;padding:10px 14px;border-radius:14px;
      background:rgba(255,140,0,.12);
      border:1px solid rgba(255,140,0,.30);
      font-size:13px;font-weight:900;
      letter-spacing:.12em;text-transform:uppercase;
      color:var(--orange);
    }

    /* =====================================================
      TOAST (notificação flutuante)
      Aparece na base da tela para mensagens rápidas
    ===================================================== */
    .toast{
      position:fixed;left:50%;bottom:16px;transform:translateX(-50%);
      background:rgba(11,31,59,.96);
      border:1px solid rgba(255,255,255,.14);
      padding:12px 14px;border-radius:16px;
      box-shadow:var(--shadow);
      display:none;max-width:min(720px, calc(100vw - 22px));
      font-size:13px;color:#fff;
    }
    .toast.show{display:block}

    /* =====================================================
      ETAPA 6: TELA DE CONCLUSÃO
      Exibida após envio bem-sucedido do formulário
    ===================================================== */
    .done{text-align:center;padding:26px 16px 28px;}
    .done h2{font-size:44px;letter-spacing:.04em;color:var(--orange);margin-bottom:10px;}
    .done p{color:var(--muted);line-height:1.5}

    /* Tabela de resumo com os dados enviados */
    .summary{
      margin:18px auto 0;max-width:720px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;background:rgba(0,0,0,.18);overflow:auto;
    }
    .summary table{width:100%;border-collapse:collapse;font-size:13px}
    .summary td{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,.08)}
    .summary td:first-child{color:rgba(255,255,255,.70);width:35%}
  </style>
</head>

<body>
  <div class="wrap">

    <!-- =====================================================
      BARRA SUPERIOR FIXA
      Logo, barra de progresso e chip de etapa
    ===================================================== -->
    <div class="top">
      <div class="brand">
        <div class="logo">VF</div>
        <div class="brandTxt" style="min-width:0">
          <div class="t1">VITOR FREITAS</div>
          <!-- Barra de progresso — largura atualizada via JS -->
          <div class="bar"><div id="bar"></div></div>
          <div class="t2" id="sub">Anamnese do aluno</div>
        </div>
      </div>
      <!-- Chip dinâmico: "ETAPA 1 DE 6", "ETAPA 2 DE 6"... -->
      <div class="stepChip" id="chip">ETAPA 1 DE 6</div>
    </div>

    <!-- =====================================================
      CARD PRINCIPAL
      Cabeçalho dinâmico + área de conteúdo do formulário
    ===================================================== -->
    <div class="card">
      <div class="head">
        <!-- Título e descrição atualizados pelo JS a cada etapa -->
        <h1 id="title">DADOS <span>PESSOAIS</span></h1>
        <p id="desc">Preencha com atenção. Isso ajuda seu treinador a personalizar o programa com segurança.</p>
        <!-- Pills de navegação geradas pelo JS -->
        <div class="nav" id="nav"></div>
      </div>

      <!-- Conteúdo do formulário injetado pelo JS -->
      <div class="body" id="content"></div>
    </div>

  </div>

  <!-- Toast de notificações rápidas -->
  <div class="toast" id="toast"></div>

  <!-- =====================================================
    JAVASCRIPT — LÓGICA DO FORMULÁRIO
    type="module" permite usar import/export (ES Modules)
  ===================================================== -->
  <script type="module">

    // Importa o cliente do Supabase via CDN
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // =====================================================
    // CONFIGURAÇÕES DO SUPABASE
    // =====================================================
    const PROJECT_URL = "https://kjigccxaggwtpoosihbl.supabase.co";
    const ANON_KEY    = "sb_publishable_Rzfa6WmpntiKSlpNDDDgcw_nVcY_Xt7";
    const BUCKET      = "anamnese-fotos";       // Nome do bucket no Supabase Storage
    const TABLE       = "anamnese_submissions"; // Nome da tabela no banco de dados

    const supabase = createClient(PROJECT_URL, ANON_KEY);

    // =====================================================
    // LÊ O CÓDIGO DA URL
    // Se o aluno acessar via link ?aluno=VF-001, o campo
    // é preenchido automaticamente e bloqueado para edição
    // =====================================================
    const params = new URLSearchParams(window.location.search);
    const codigoUrl = params.get("aluno")?.trim().toUpperCase() || "";

    // Expressão regular que valida o formato VF-000
    const REGEX_CODIGO = /^VF-\d{3}$/;

    // =====================================================
    // UTILITÁRIOS
    // =====================================================

    // Atalho para document.querySelector
    const $ = (s)=>document.querySelector(s);

    // Exibe uma notificação flutuante (toast) por 3.2 segundos
    const toast = (msg)=>{
      const t=$("#toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(window.__tto);
      window.__tto=setTimeout(()=>t.classList.remove("show"), 3200);
    };

    // Escapa caracteres HTML para evitar XSS ao renderizar dados do usuário
    const esc = (v)=> (v??"").toString()
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");

    // =====================================================
    // DEFINIÇÃO DAS 6 ETAPAS
    // Cada etapa tem label (pill), título e descrição
    // =====================================================
    const steps = [
      { label:"Dados",       title:"DADOS <span>PESSOAIS</span>",           desc:"Preencha com atenção. Isso ajuda seu treinador a personalizar o programa com segurança."},
      { label:"Objetivo",    title:"OBJETIVO <span>& ROTINA</span>",        desc:"Explique seu objetivo e possíveis limitações."},
      { label:"Preferência", title:"PIRÂMIDE <span>DE PREFERÊNCIA</span>",  desc:"Organize os grupos musculares do mais prioritário (1º) ao menos prioritário (9º)."},
      { label:"Saúde",       title:"SAÚDE <span>& RESTRIÇÕES</span>",       desc:"Informações para treinar com segurança."},
      { label:"Fotos",       title:"FOTOS <span>DE AVALIAÇÃO</span>",       desc:"Veja os modelos e envie 10 fotos seguindo o padrão."},
      { label:"Final",       title:"ENVIO <span>CONCLUÍDO</span>",          desc:"Pronto! As informações foram enviadas."}
    ];

    // =====================================================
    // ESTADO GLOBAL DO FORMULÁRIO
    // Armazena todos os dados enquanto o aluno preenche
    // =====================================================
    const state = {
      step:0,
      submissionId:null,
      student_code: codigoUrl,          // Pré-preenche com código da URL (se existir)
      codigoViaUrl: codigoUrl !== "",   // Flag: true = código veio pela URL (bloquear edição)
      full_name:"",
      phone:"",
      birth_date:"",
      sex:"",
      weight_kg:"",
      height_cm:"",
      goal:"",
      injuries:"",
      // Ordem padrão dos grupos musculares (reordenável na etapa 3)
      priority:["Peitoral","Costas","Ombro","Bíceps","Tríceps","Abdômen","Quadríceps","Posterior","Glúteos"],
      // Array de 10 slots para as fotos de avaliação
      uploads:Array.from({length:10}, ()=>({file:null, ok:false, err:""}))
    };

    // =====================================================
    // FUNÇÕES DE NAVEGAÇÃO E RENDERIZAÇÃO
    // =====================================================

    // Renderiza as pills de navegação no cabeçalho
    function renderNav(){
      const nav=$("#nav"); nav.innerHTML="";
      steps.forEach((s,i)=>{
        const el=document.createElement("div");
        el.className="pill"+(i===state.step?" active":"");
        el.textContent=s.label;
        el.onclick=()=>go(i);   // Clique na pill navega para aquela etapa
        nav.appendChild(el);
      });
    }

    // Atualiza título, descrição, chip e barra de progresso
    function header(){
      $("#title").innerHTML=steps[state.step].title;
      $("#desc").textContent=steps[state.step].desc;
      $("#chip").textContent=`ETAPA ${state.step+1} DE ${steps.length}`;
      // Barra de progresso: percentual baseado na etapa atual
      $("#bar").style.width = `${Math.round(((state.step+1)/steps.length)*100)}%`;
      document.querySelectorAll(".pill").forEach((p,i)=>p.classList.toggle("active", i===state.step));
    }

    // Navega para a etapa i (com limites 0 a 5)
    function go(i){ state.step=Math.max(0, Math.min(steps.length-1, i)); render(); }
    function next(){ go(state.step+1); }
    function prev(){ go(state.step-1); }

    // =====================================================
    // ETAPA 1: DADOS PESSOAIS
    // Campos: código, nome, nascimento, sexo, peso, altura, telefone
    // =====================================================
    function step1(){
      const bloqueado = state.codigoViaUrl;  // Campo bloqueado se código veio pela URL
      return `
        <div class="grid cols2">
          <div>
            <label>Código do aluno *</label>
            <input id="student_code"
              placeholder="Ex: VF-001"
              value="${esc(state.student_code)}"
              ${bloqueado ? "disabled" : ""}
              style="text-transform:uppercase"
            />
            ${bloqueado
              /* Se veio pela URL: mostra badge VIP com o código */
              ? `<div class="vipBadge">🔑 Acesso exclusivo · ${esc(state.student_code)}</div>`
              /* Se digitado manualmente: mostra instrução de formato */
              : `<div class="hint">Use exatamente o código informado pelo seu treinador. Formato: VF-000</div>`
            }
          </div>
          <div>
            <label>Nome completo *</label>
            <input id="full_name" placeholder="Seu nome completo" value="${esc(state.full_name)}"/>
          </div>
          <div>
            <label>Data de nascimento</label>
            <input id="birth_date" type="date" value="${esc(state.birth_date)}"/>
          </div>
          <div>
            <label>Sexo</label>
            <select id="sex">
              <option value="" ${state.sex===""?"selected":""}>Selecione...</option>
              <option value="Feminino" ${state.sex==="Feminino"?"selected":""}>Feminino</option>
              <option value="Masculino" ${state.sex==="Masculino"?"selected":""}>Masculino</option>
              <option value="Outro" ${state.sex==="Outro"?"selected":""}>Outro</option>
              <option value="Prefiro não informar" ${state.sex==="Prefiro não informar"?"selected":""}>Prefiro não informar</option>
            </select>
          </div>
          <div>
            <label>Peso (kg)</label>
            <input id="weight_kg" inputmode="decimal" placeholder="Ex: 75" value="${esc(state.weight_kg)}"/>
          </div>
          <div>
            <label>Altura (cm)</label>
            <input id="height_cm" inputmode="numeric" placeholder="Ex: 175" value="${esc(state.height_cm)}"/>
          </div>
          <div style="grid-column:1/-1">
            <label>Telefone / WhatsApp</label>
            <input id="phone" placeholder="(11) 99999-9999" value="${esc(state.phone)}"/>
          </div>
        </div>
        <div class="btnRow">
          <button class="btn primary" id="n1">Próxima etapa</button>
        </div>
      `;
    }

    // =====================================================
    // ETAPA 2: OBJETIVO E ROTINA
    // Campos: objetivo principal e lesões/restrições
    // =====================================================
    function step2(){
      return `
        <div class="grid cols2">
          <div style="grid-column:1/-1">
            <label>Objetivo principal</label>
            <select id="goal">
              <option value="" ${state.goal===""?"selected":""}>Selecione...</option>
              <option value="Emagrecimento" ${state.goal==="Emagrecimento"?"selected":""}>Emagrecimento</option>
              <option value="Ganho de massa" ${state.goal==="Ganho de massa"?"selected":""}>Ganho de massa</option>
              <option value="Condicionamento" ${state.goal==="Condicionamento"?"selected":""}>Condicionamento</option>
              <option value="Performance" ${state.goal==="Performance"?"selected":""}>Performance</option>
              <option value="Saúde" ${state.goal==="Saúde"?"selected":""}>Saúde</option>
            </select>
          </div>
          <div style="grid-column:1/-1">
            <label>Lesão / Restrição médica?</label>
            <textarea id="injuries" placeholder="Ex: dor no joelho, hérnia, etc.">${esc(state.injuries)}</textarea>
          </div>
        </div>
        <div class="btnRow">
          <button class="btn" id="p2">Voltar</button>
          <button class="btn primary" id="n2">Próxima etapa</button>
        </div>
      `;
    }

    // =====================================================
    // ETAPA 3: PIRÂMIDE DE PREFERÊNCIA
    // Lista de 9 grupos musculares reordenável com botões ↑ e ↓
    // A ordem é salva em state.priority e enviada como JSON ao Supabase
    // =====================================================
    function step3(){
      const emojis = ["🔥","💎","🚀","💪","⚡","🏆","🎯","📈","🛡️"];
      const rows = state.priority.map((name, i)=>`
        <div class="rankItem" style="
          background:linear-gradient(145deg, rgba(255,140,0,.08), rgba(255,255,255,.04));
          border:1px solid rgba(255,255,255,.08);transition:.25s ease;">
          <div class="rankLeft">
            <div class="rankNum">${i+1}º</div>
            <div>
              <div class="rankName">${esc(name)}</div>
              <div style="font-size:14px;margin-top:4px">${emojis[i] || "💪"}</div>
            </div>
          </div>
          <div class="rankBtns">
            <!-- data-m="up/down" e data-i=índice usados pelo JS para mover itens -->
            <button class="miniBtn" data-m="up" data-i="${i}" ${i===0?"disabled":""}>↑</button>
            <button class="miniBtn" data-m="down" data-i="${i}" ${i===state.priority.length-1?"disabled":""}>↓</button>
          </div>
        </div>
      `).join("");

      return `
        <div class="hint">
          💎 Organize seus grupos musculares por prioridade.<br>
          🔥 O topo representa seu foco máximo.
        </div>
        <div class="rankList" style="margin-top:18px">${rows}</div>
        <div class="btnRow">
          <button class="btn" id="p3">Voltar</button>
          <button class="btn primary" id="n3">Próxima etapa</button>
        </div>
      `;
    }

    // =====================================================
    // ETAPA 4: SAÚDE E RESTRIÇÕES
    // Campos: dor ao treinar, qualidade do sono, observações
    // =====================================================
    function step4(){
      return `
        <div class="grid cols2">
          <div style="grid-column:1/-1">
            <label>Sente dor ao treinar?</label>
            <select id="q_pain">
              <option value="">Selecione...</option>
              <option value="Não">Não</option>
              <option value="Às vezes">Às vezes</option>
              <option value="Frequentemente">Frequentemente</option>
            </select>
          </div>
          <div style="grid-column:1/-1">
            <label>Como está seu sono?</label>
            <select id="q_sleep">
              <option value="">Selecione...</option>
              <option value="Bom">Bom</option>
              <option value="Regular">Regular</option>
              <option value="Ruim">Ruim</option>
            </select>
          </div>
          <div style="grid-column:1/-1">
            <label>Observações adicionais</label>
            <textarea id="q_notes" placeholder="Digite aqui..."></textarea>
          </div>
        </div>
        <div class="btnRow">
          <button class="btn" id="p4">Voltar</button>
          <button class="btn primary" id="n4">Próxima etapa</button>
        </div>
      `;
    }

    // =====================================================
    // ETAPA 5: FOTOS DE AVALIAÇÃO
    // Mostra 10 fotos modelo como referência visual
    // Aluno envia 10 fotos (max 10MB cada, apenas imagens)
    // =====================================================
    function step5(){
      // Gera os cards das fotos modelo (assets/fotos-modelo/01.jpg a 10.jpg)
      const modelos = Array.from({length:10}, (_,i)=>{
        const n = String(i+1).padStart(2,"0");
        return `
          <div class="modelCard">
            <img src="assets/fotos-modelo/${n}.jpg" alt="Modelo ${n}"
              onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=&quot;padding:18px;color:rgba(255,255,255,.8);text-align:center&quot;>Não achou:<br><b>assets/fotos-modelo/${n}.jpg</b></div>';">
            <div class="modelCap">
              <span>Modelo ${n}</span>
              <span class="tag">Exemplo</span>
            </div>
          </div>
        `;
      }).join("");

      // Gera os cards de upload (1 por foto, com status dinâmico)
      const ups = state.uploads.map((u,i)=>{
        const n=String(i+1).padStart(2,"0");
        return `
          <div class="upCard">
            <div class="upHead">
              <div class="tag">Foto ${n}</div>
              <!-- Status: neutro / Selecionada ✅ / Erro ❌ -->
              <div class="status ${u.ok?"ok":(u.err?"err":"")}">
                ${u.ok?"Selecionada ✅":(u.err?("Erro: "+esc(u.err)):"Selecione uma imagem")}
              </div>
            </div>
            <!-- data-up=índice usado pelo JS para identificar qual foto foi selecionada -->
            <input type="file" accept="image/*" capture="environment" data-up="${i}" style="margin-top:10px" />
            <div class="hint">Boa iluminação + câmera estável.</div>
          </div>
        `;
      }).join("");

      return `
        <label>10 Fotos modelo (exemplo)</label>
        <div class="models">${modelos}</div>
        <label style="margin-top:18px">Envio das 10 fotos do aluno</label>
        <div class="hint">🔧 Para melhor visualização, utilize o botão de expandir (⤢) localizado na parte inferior do sistema.</div>
        <div class="uploads">${ups}</div>
        <div class="btnRow">
          <button class="btn" id="p5">Voltar</button>
          <button class="btn primary" id="send">Enviar</button>
        </div>
      `;
    }

    // =====================================================
    // ETAPA 6: CONFIRMAÇÃO DE ENVIO
    // Exibe resumo dos dados enviados e ID da submissão
    // =====================================================
    function step6(){
      return `
        <div class="done">
          <h2>ENVIO CONCLUÍDO!</h2>
          <p>Perfeito! Seu treinador recebeu as informações e fotos.</p>
          <div class="summary">
            <table>
              <tr><td>Código</td><td><b>${esc(state.student_code)}</b></td></tr>
              <tr><td>Nome</td><td>${esc(state.full_name)}</td></tr>
              <tr><td>Objetivo</td><td>${esc(state.goal||"-")}</td></tr>
              <tr><td>Uploads</td><td>${state.uploads.filter(x=>x.ok).length}/10</td></tr>
              <!-- ID único gerado pelo Supabase para rastrear esta submissão -->
              <tr><td>ID do envio</td><td style="font-family:ui-monospace, Menlo, monospace">${esc(state.submissionId||"-")}</td></tr>
            </table>
          </div>
          <div class="btnRow" style="justify-content:center">
            <button class="btn primary" onclick="location.reload()">Enviar outro aluno</button>
          </div>
        </div>
      `;
    }

    // =====================================================
    // FUNÇÃO RENDER
    // Orquestra toda a renderização da etapa atual
    // =====================================================
    function render(){
      renderNav();
      header();
      const c=$("#content");
      // Seleciona e executa a função da etapa atual (step1 a step6)
      c.innerHTML = [step1,step2,step3,step4,step5,step6][state.step]();
      bind();  // Re-vincula os eventos após re-renderizar
    }

    // =====================================================
    // FUNÇÃO BIND
    // Vincula eventos aos elementos do DOM após cada render
    // Necessário porque o innerHTML é substituído a cada etapa
    // =====================================================
    function bind(){
      // --- ETAPA 1: vincula campos ao state ---
      const sc=$("#student_code");
      if(sc && !state.codigoViaUrl){
        // Só vincula se o código não veio pela URL (campo editável)
        sc.oninput=e=>{ state.student_code = e.target.value.trim().toUpperCase(); };
      }
      const fn=$("#full_name"); if(fn) fn.oninput=e=>state.full_name=e.target.value;
      const ph=$("#phone"); if(ph) ph.oninput=e=>state.phone=e.target.value;
      const bd=$("#birth_date"); if(bd) bd.oninput=e=>state.birth_date=e.target.value;
      const sx=$("#sex"); if(sx) sx.onchange=e=>state.sex=e.target.value;
      const wk=$("#weight_kg"); if(wk) wk.oninput=e=>state.weight_kg=e.target.value;
      const hc=$("#height_cm"); if(hc) hc.oninput=e=>state.height_cm=e.target.value;

      // Botão "Próxima etapa" da etapa 1 — valida código e nome antes de avançar
      const n1=$("#n1"); if(n1) n1.onclick=()=>{
        if(!state.student_code){
          toast("Preencha o CÓDIGO do aluno."); return;
        }
        if(!REGEX_CODIGO.test(state.student_code)){
          toast("Código inválido. Use o formato VF-000 (ex: VF-001)."); return;
        }
        if(!state.full_name){
          toast("Preencha o NOME completo."); return;
        }
        next();
      };

      // --- ETAPA 2 ---
      const goal=$("#goal"); if(goal) goal.onchange=e=>state.goal=e.target.value;
      const inj=$("#injuries"); if(inj) inj.oninput=e=>state.injuries=e.target.value;
      const p2=$("#p2"); if(p2) p2.onclick=prev;
      const n2=$("#n2"); if(n2) n2.onclick=next;

      // --- ETAPA 3: lógica de reordenação dos grupos musculares ---
      document.querySelectorAll("[data-m]").forEach(btn=>{
        btn.onclick=()=>{
          const dir=btn.getAttribute("data-m");     // "up" ou "down"
          const i=Number(btn.getAttribute("data-i")); // índice do item
          const j=dir==="up"?i-1:i+1;               // índice de destino
          const arr=state.priority.slice();
          const tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;  // Troca os dois itens
          state.priority=arr;
          render();  // Re-renderiza para refletir a nova ordem
        };
      });
      const p3=$("#p3"); if(p3) p3.onclick=prev;
      const n3=$("#n3"); if(n3) n3.onclick=next;

      // --- ETAPA 4 ---
      const p4=$("#p4"); if(p4) p4.onclick=prev;
      const n4=$("#n4"); if(n4) n4.onclick=next;

      // --- ETAPA 5: validação e seleção de cada foto ---
      document.querySelectorAll('input[type="file"][data-up]').forEach(inp=>{
        inp.onchange=()=>{
          const idx=Number(inp.getAttribute("data-up"));
          const f=inp.files?.[0];
          if(!f) return;
          const maxMB=10;
          if(!f.type.startsWith("image/")){
            state.uploads[idx]={file:null,ok:false,err:"Não é imagem"};
            render(); return;
          }
          if(f.size>maxMB*1024*1024){
            state.uploads[idx]={file:null,ok:false,err:`Máx ${maxMB}MB`};
            render(); return;
          }
          state.uploads[idx]={file:f,ok:true,err:""};
          render();
        };
      });
      const p5=$("#p5"); if(p5) p5.onclick=prev;

      // --- BOTÃO ENVIAR: submete dados e fotos ao Supabase ---
      const send=$("#send");
      if(send) send.onclick=async ()=>{
        const count=state.uploads.filter(x=>x.file).length;
        if(count<10){
          toast(`Selecione as 10 fotos. Atualmente: ${count}/10`); return;
        }
        send.disabled=true;
        send.textContent="ENVIANDO...";

        try{
          toast("Enviando dados...");

          // Monta o payload com todos os dados do formulário
          const payload={
            student_code: state.student_code,
            full_name: state.full_name,
            phone: state.phone || null,
            birth_date: state.birth_date || null,
            sex: state.sex || null,
            // Converte vírgula para ponto antes de converter para número
            weight_kg: state.weight_kg ? Number(String(state.weight_kg).replace(",", ".")) : null,
            height_cm: state.height_cm ? Number(String(state.height_cm).replace(",", ".")) : null,
            goal: state.goal || null,
            injuries: state.injuries || null,
            muscle_priority: state.priority  // Array de strings salvo como JSONB
          };

          // Insere os dados na tabela e recupera o ID gerado
          const { data, error } = await supabase
            .from(TABLE)
            .insert(payload)
            .select("id")
            .single();

          if(error) throw error;
          state.submissionId = data.id;

          toast("Enviando fotos...");
          const paths = [];

          // Faz upload de cada foto individualmente para o Storage
          for(let i=0;i<10;i++){
            const f=state.uploads[i].file;
            const n=String(i+1).padStart(2,"0");
            const ext=(f.name.split(".").pop()||"jpg").toLowerCase();
            const safeExt = ext.replace(/[^a-z0-9]/g,"") || "jpg";
            // Caminho no Storage: CODIGO_ALUNO/ID_SUBMISSAO/01.jpg
            const path = `${state.student_code}/${state.submissionId}/${n}.${safeExt}`;

            const { error: upErr } = await supabase
              .storage.from(BUCKET)
              .upload(path, f, { upsert:true, contentType:f.type, cacheControl:"3600" });

            if(upErr) throw upErr;
            paths.push(path);
          }

          // Atualiza o registro no banco com os caminhos das fotos
          const { error: up2 } = await supabase
            .from(TABLE)
            .update({ photo_paths: paths })
            .eq("id", state.submissionId);

          if(up2) throw up2;

          toast("Enviado ✅");
          next();  // Avança para a etapa 6 (confirmação)

        }catch(err){
          console.error(err);
          alert("Erro ao enviar:\n" + (err?.message || JSON.stringify(err)));
          toast("Falha ao enviar. Confira policy do bucket (INSERT) e RLS da tabela.");
        }finally{
          send.disabled=false;
          send.textContent="Enviar";
        }
      };
    }

    // Inicializa o formulário na etapa 1
    render();
  </script>
</body>
</html>
